name: Update WPILib Installer Tag

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'The tag to update to (e.g., v2026.1.2)'
        required: true

jobs:
  update-version:
    runs-on: ubuntu-latest
    if: github.repository == 'Gold872/elastic_dashboard'
    steps:
      - name: Get Target Tag
        id: vars
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.tag_name }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ github.event.release.tag_name }}" >> $GITHUB_OUTPUT
          fi

      - name: Checkout Upstream Repo
        uses: actions/checkout@v4
        with:
          repository: wpilibsuite/WPILibInstaller-Avalonia
          ref: 2027
          token: ${{ secrets.INSTALLER_UPDATE_TOKEN }}
          fetch-depth: 0

      - name: Update versions.gradle
        run: |
          echo "--- Content before update ---"
          grep "ext.elasticGitTag" scripts/versions.gradle || echo "Line not found in file!"
          
          # More robust regex: handles single/double quotes and flexible spacing
          sed -i "s/ext.elasticGitTag[[:space:]]*=[[:space:]]*['\"].*['\"]/ext.elasticGitTag = '${{ steps.vars.outputs.tag }}'/" scripts/versions.gradle
          
          echo "--- Content after update ---"
          grep "ext.elasticGitTag" scripts/versions.gradle

          ls -al

          git diff

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.INSTALLER_UPDATE_TOKEN }}
          push-to-fork: Gold872/WPILibInstaller-Avalonia
          branch: "update-elastic-${{ steps.vars.outputs.tag }}"
          title: "Update Elastic to ${{ steps.vars.outputs.tag }}"
          body: "Automated update triggered by release ${{ steps.vars.outputs.tag }} of elastic_dashboard"
          committer: Gold87 <91761103+Gold872@users.noreply.github.com>
          author: Gold87 <91761103+Gold872@users.noreply.github.com>
          commit-message: "Update Elastic to ${{ steps.vars.outputs.tag }}"
